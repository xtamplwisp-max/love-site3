
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Люблю тебя, жаным 🌸</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(to top,#ffe6f0,#fff5fa);
    position: relative;
}

/* 🌸 Сакура на фоне */
body::before{
    content:"🌸🌸🌸🌸🌸🌸🌸🌸🌸";
    position:absolute;
    font-size:80px;
    opacity:0.07;
    width:100%;
    height:100%;
    display:flex;
    flex-wrap:wrap;
    justify-content:space-around;
    align-items:center;
    z-index:0;
}

/* 💖 Плавающие сердечки */
.big-heart{
    position:absolute;
    font-size:90px;
    animation:float 6s ease-in-out infinite;
    z-index:2;
}
.top-left{ top:20px; left:20px; }
.bottom-right{ bottom:20px; right:20px; }

@keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-25px); }
}

/* 🌸 Падающие лепестки */
.petal{
    position:absolute;
    font-size:22px;
    animation:fall linear infinite;
}
@keyframes fall{
    from{ transform:translateY(-10vh) rotate(0deg); }
    to{ transform:translateY(110vh) rotate(360deg); }
}

/* ✨ Блики */
.sparkle{
    position:absolute;
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    animation:blink 2s infinite alternate;
}
@keyframes blink{
    from{ opacity:0.2; transform:scale(0.5); }
    to{ opacity:1; transform:scale(1.5); }
}

/* 💌 Конверт */
.envelope{
    position:relative;
    width:380px;
    height:260px;
    background:#fff;
    border-radius:25px;
    box-shadow:0 25px 50px rgba(0,0,0,0.25);
    cursor:pointer;
    z-index:3;
    transition:transform 0.6s ease;
}
.envelope:hover{
    transform:scale(1.05);
}

/* Крышка конверта */
.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff6b81;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transform-origin:top;
    transition:transform 1s ease;
    border-radius:25px 25px 0 0;
}

.envelope.open .flap{
    transform:rotateX(180deg);
}

/* Письмо */
.letter{
    position:absolute;
    width:90%;
    height:85%;
    background:white;
    top:10%;
    left:5%;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    opacity:0;
    transition:opacity 1s ease;
}

.envelope.open .letter{
    opacity:1;
}

h2{
    font-size:28px;
    margin-bottom:25px;
    transition:opacity 1s ease;
}

button{
    padding:12px 28px;
    margin:10px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    transition:all 0.5s ease;
}

#yes{
    background:#ff4d6d;
    color:white;
}

#no{
    background:#eee;
}

/* 💖 Надпись после Да */
.success{
    position:absolute;
    font-size:48px;
    color:#ff2e63;
    display:none;
    text-shadow:0 0 20px pink;
    font-family: 'Pacifico', cursive;
    opacity:0;
    transition:opacity 2s ease;
    z-index:4;
}

/* 🎆 Фейерверк */
.firework{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    animation:explode 1s ease-out forwards;
}
@keyframes explode{
    from{ transform:scale(1); opacity:1; }
    to{ transform:scale(15); opacity:0; }
}
</style>
</head>
<body>

<div class="big-heart top-left">❤️</div>
<div class="big-heart bottom-right">❤️</div>

<div class="envelope" id="env" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="letter">
        <h2 id="questionText">Будешь ли ты моим партнёром? 💕</h2>
        <div>
            <button id="yes" onclick="sayYes(event)">Да</button>
            <button id="no" onclick="moveNo()">Нет</button>
        </div>
    </div>
</div>

<div class="success" id="loveText">Люблю тебя, жаным 💖</div>

<script>
/* Лепестки */
for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="petal";
    p.innerHTML="🌸";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}

/* Блики */
for(let i=0;i<30;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
}

/* Открытие конверта */
function openEnvelope(){
    document.getElementById("env").classList.add("open");
}

/* Кнопка Нет — убегает */
function moveNo(){
    const btn=document.getElementById("no");
    const maxX=window.innerWidth-btn.offsetWidth;
    const maxY=window.innerHeight-btn.offsetHeight;
    btn.style.position="fixed";
    btn.style.left=Math.random()*maxX+"px";
    btn.style.top=Math.random()*maxY+"px";
}

/* Кнопка Да — убираем вопрос и конверт, показываем надпись */
function sayYes(e){
    e.stopPropagation();
    const env=document.getElementById("env");
    const question=document.getElementById("questionText");
    env.style.opacity=0;
    setTimeout(()=>env.style.display="none",600);
    question.style.display="none";
    
    const loveText=document.getElementById("loveText");
    loveText.style.display="block";
    setTimeout(()=>loveText.style.opacity=1,100); // плавное появление
    launchFireworks();
}

/* Фейерверк бесконечно */
function launchFireworks(){
    setInterval(()=>{
        for(let i=0;i<30;i++){
            let f=document.createElement("div");
            f.className="firework";
            f.style.background="hsl("+Math.random()*360+",100%,60%)";
            f.style.left=Math.random()*100+"vw";
            f.style.top=Math.random()*100+"vh";
            document.body.appendChild(f);
            setTimeout(()=>f.remove(),1000);
        }
    },500);
}
</script>

</body>
</html>
